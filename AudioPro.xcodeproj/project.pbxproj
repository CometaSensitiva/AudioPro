			shellPath = /bin/sh;
			shellScript = "set -euo pipefail\n\nX86_64_FFMPEG=\"${SRCROOT}/AudioPro/ffmpeg-binary-x86_64\"\nARM64_FFMPEG=\"${SRCROOT}/AudioPro/ffmpeg-binary-arm64\"\nX86_64_SHA256=\"26b3ff92f64950f16be16eed88fe29064c2df516efdfac66cb8fa9abed030bdf\"\nARM64_SHA256=\"3b586ff896c0339e8fd574c143aaccac23c80789341e22d4202f8013a133d3a4\"\nHELPERS_DIR=\"${TARGET_BUILD_DIR}/${CONTENTS_FOLDER_PATH}/Helpers\"\nSTAGING_DIR=\"${TARGET_TEMP_DIR}/FFmpegHelper\"\nHELPER_ENTITLEMENTS=\"${SRCROOT}/AudioPro/FFmpegHelper.entitlements\"\n\nmkdir -p \"$HELPERS_DIR\" \"$STAGING_DIR\"\n\nverify_source_hash() {\n  local source_path=\"$1\"\n  local expected_hash=\"$2\"\n\n  if [ ! -f \"$source_path\" ]; then\n    echo \"error: Missing vendored ffmpeg helper $source_path\"\n    exit 1\n  fi\n\n  local actual_hash\n  actual_hash=\"$(/usr/bin/shasum -a 256 \"$source_path\" | /usr/bin/awk '{print $1}')\"\n  if [ \"$actual_hash\" != \"$expected_hash\" ]; then\n    echo \"error: SHA-256 mismatch for $(basename \"$source_path\"). Expected $expected_hash but found $actual_hash\"\n    exit 1\n  fi\n\n  echo \"note: Verified SHA-256 for $(basename \"$source_path\").\"\n}\n\npackage_helper() {\n  local source_path=\"$1\"\n  local helper_name=\"$2\"\n  local staged_helper=\"${STAGING_DIR}/${helper_name}\"\n  local helper_path=\"${HELPERS_DIR}/${helper_name}\"\n\n  /bin/cp -f \"$source_path\" \"$staged_helper\"\n  chmod 755 \"$staged_helper\"\n  xattr -cr \"$staged_helper\"\n\n  local arch_info\n  arch_info=\"$(/usr/bin/lipo -info \"$staged_helper\" 2>/dev/null || true)\"\n  case \"$arch_info\" in\n    *arm64*) echo \"note: Packaging arm64/universal ffmpeg helper from $(basename \"$source_path\").\" ;;\n    *) echo \"note: Packaging x86_64 ffmpeg helper from $(basename \"$source_path\").\" ;;\n  esac\n\n  if [ \"${CODE_SIGNING_ALLOWED}\" = \"YES\" ] && [ -n \"${EXPANDED_CODE_SIGN_IDENTITY:-}\" ] && [ \"${EXPANDED_CODE_SIGN_IDENTITY}\" != \"-\" ]; then\n    /usr/bin/codesign --force --sign \"$EXPANDED_CODE_SIGN_IDENTITY\" --entitlements \"$HELPER_ENTITLEMENTS\" --options runtime --timestamp=none --generate-entitlement-der -i \"${PRODUCT_BUNDLE_IDENTIFIER}.${helper_name}\" \"$staged_helper\"\n  else\n    echo \"note: Skipping ffmpeg helper codesign because app code signing is disabled.\"\n  fi\n\n  /bin/cp -f \"$staged_helper\" \"$helper_path\"\n}\n\nverify_source_hash \"$ARM64_FFMPEG\" \"$ARM64_SHA256\"\nverify_source_hash \"$X86_64_FFMPEG\" \"$X86_64_SHA256\"\npackage_helper \"$ARM64_FFMPEG\" \"ffmpeg-binary-arm64\"\npackage_helper \"$X86_64_FFMPEG\" \"ffmpeg-binary-x86_64\"\n";
